<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', system-ui, sans-serif;
            cursor: default;
            user-select: none;
        }
        canvas { display: block; }

        #menu {
            position: fixed;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
            pointer-events: none;
        }
        .menu-item {
            pointer-events: auto;
            padding: 10px 40px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            text-shadow: 0 0 20px transparent;
        }
        .menu-item::before {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff6b9d, #c44dff, transparent);
            transform: translateX(-50%);
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 2px;
        }
        .menu-item:hover,
        .menu-item.selected {
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 30px rgba(196, 77, 255, 0.3);
            transform: scale(1.05);
        }
        .menu-item.selected::before,
        .menu-item:hover::before {
            width: 70%;
        }
        .menu-item:active {
            transform: scale(0.95);
            transition-duration: 0.1s;
        }
        .menu-item .key-hint {
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.15);
            display: block;
            margin-top: 2px;
        }

        #title {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        #title h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ff6b9d, #c44dff, #6b5bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(196,77,255,0.15));
        }
        #title p {
            font-size: 12px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.2);
            margin-top: 6px;
            font-weight: 300;
        }

        #hint {
            position: fixed;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.1);
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }

        @media (max-width: 600px) {
            #title h1 { font-size: 28px; letter-spacing: 4px; }
            .menu-item { font-size: 14px; padding: 8px 24px; }
            #menu { bottom: 8%; gap: 4px; }
        }
    </style>
</head>
<body>

    <div id="title">
        <h1>DONUT WORLD</h1>
        <p>━ A SWEET ADVENTURE ━</p>
    </div>

    <div id="menu">
        <button class="menu-item" data-action="play">
            PLAY
            <span class="key-hint">[ ENTER ]</span>
        </button>
        <button class="menu-item" data-action="options">
            OPTIONS
            <span class="key-hint">[ O ]</span>
        </button>
        <button class="menu-item" data-action="credits">
            CREDITS
            <span class="key-hint">[ C ]</span>
        </button>
    </div>

    <div id="hint">↻ drag to spin  ·  scroll to zoom  ·  hover to look</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="donutOC.js"></script>
</body>
</html>
